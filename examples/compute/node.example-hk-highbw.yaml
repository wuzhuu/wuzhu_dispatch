# Compute Server configuration: High-bandwidth node (HK region)
# Path: /etc/wuzhu-dispatch/node.yaml
dispatcher_url: "https://dispatch.example.com"

node_id: "example-hk-highbw"
agent_token: "CHANGE_ME"

name: "Example HK High Bandwidth Compute Server"
region: "HK"
provider: "ExampleProvider"

roles:
  - compute_server

tags:
  - hk
  - high_bandwidth
  - cn_reachable
  - public_ipv4
  - hermes_worker

static_profile:
  cpu_cores: 2
  memory_mb: 2048
  bandwidth_mbps: 300
  public_ipv4: true
  public_ipv6: false
  cn_reachable: good
  foreign_reachable: excellent
  runtime:
    shell: true
    python: true
    docker: true
    hermes: true
  limits:
    max_parallel_tasks: 3
    allow_heavy_download: true
    allow_heavy_compute: false

agent:
  # Heartbeat — lightweight (online proof) and full metrics
  heartbeat_interval_seconds: 20
  lightweight_heartbeat_interval_seconds: 30
  idle_metrics_interval_seconds: 60
  cold_idle_metrics_interval_seconds: 120

  # Pull intervals — adaptive
  active_pull_interval_seconds: 3
  warm_idle_pull_interval_seconds: 10
  cold_idle_pull_interval_seconds: 30
  max_idle_pull_interval_seconds: 60
  pull_interval_seconds: 10

  # Long polling — dispatcher holds connection when idle
  long_poll_wait_seconds: 25

  # Error backoff
  pull_error_backoff_max_seconds: 120

  work_dir: "/opt/wuzhu-dispatch/work"
  log_dir: "/opt/wuzhu-dispatch/logs"
  allowed_hermes_workspaces:
    - /home/example/workspace
