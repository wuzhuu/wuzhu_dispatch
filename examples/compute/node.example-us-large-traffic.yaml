# Compute Server configuration: Large-traffic node (US region)
# Path: /etc/wuzhu-dispatch/node.yaml
dispatcher_url: "https://dispatch.example.com"

node_id: "example-us-large-traffic"
agent_token: "CHANGE_ME"

name: "Example US Large Traffic Worker"
region: "US"
provider: "ExampleUSProvider"

roles:
  - worker

tags:
  - us
  - high_traffic
  - foreign_reachable
  - public_ipv4
  - hermes_worker

static_profile:
  cpu_cores: 2
  memory_mb: 2048
  bandwidth_mbps: 30
  public_ipv4: true
  public_ipv6: false
  cn_reachable: poor
  foreign_reachable: excellent
  runtime:
    shell: true
    python: true
    docker: true
    hermes: true
  limits:
    max_parallel_tasks: 2
    allow_heavy_download: true
    allow_heavy_compute: false

agent:
  heartbeat_interval_seconds: 20
  pull_interval_seconds: 10
  work_dir: "/opt/wuzhu-dispatch/work"
  log_dir: "/opt/wuzhu-dispatch/logs"
